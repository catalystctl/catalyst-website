<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0b"/>
      <stop offset="100%" style="stop-color:#111113"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent glow -->
  <ellipse cx="150" cy="315" rx="400" ry="250" fill="url(#accent)"/>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" rx="0" fill="none" stroke="#27272a" stroke-width="1"/>

  <!-- Title -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#fafafa">
    Catalyst
  </text>

  <!-- Subtitle -->
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#a1a1aa">
    Modern Game Server Management
  </text>

  <!-- Tagline -->
  <text x="80" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#71717a">
    Built with Rust, TypeScript, and containerd — the Pterodactyl replacement.
  </text>

  <!-- URL -->
  <text x="80" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#52525b">
    catalystctl.com
  </text>

  <!-- Accent line -->
  <rect x="80" y="295" width="80" height="3" rx="1.5" fill="#14b8a6"/>
</svg>
